version: 2
updates:

  # Python package updates — weekly, dev deps grouped to reduce PR noise
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        patterns:
          - "pytest*"
          - "ruff"
          - "mypy"
          - "bandit"
          - "pip-audit"
          - "httpx"
          - "types-*"

  # GitHub Actions SHA pin updates — weekly
  # Dependabot will propose updated full commit SHAs for all pinned actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5

  # Docker base image digest updates — weekly
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 2

  # Docker Compose images in Pi deploy stack (Traefik, Watchtower) — weekly
  - package-ecosystem: "docker-compose"
    directory: "/deploy/pi"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 2
