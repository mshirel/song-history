version: 2
updates:

  # Python package updates — weekly, dev deps grouped to reduce PR noise
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        patterns:
          - "pytest*"
          - "ruff"
          - "mypy"
          - "bandit"
          - "pip-audit"
          - "httpx"
          - "types-*"

  # GitHub Actions SHA pin updates — weekly
  # Dependabot will propose updated full commit SHAs for all pinned actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5

  # Docker base image digest updates — weekly
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 2

  # Docker images in Pi deploy stack (Traefik, Promtail, Cloudflared) — weekly.
  # Uses the "docker" ecosystem (not "docker-compose", which is not a valid
  # Dependabot ecosystem); since 2024 "docker" scans both Dockerfiles and
  # docker-compose.yml files in the directory.
  - package-ecosystem: "docker"
    directory: "/deploy/pi"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 2
