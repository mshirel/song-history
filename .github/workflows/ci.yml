name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 6 * * 1"  # Every Monday — rebuild to pick up base image security patches

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev,web,ocr]"

      - name: Lint (ruff)
        run: python3 -m ruff check src/

      - name: Type check (mypy)
        run: python3 -m mypy src/

      - name: Test
        run: python3 -m pytest

  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read  # gitleaks needs this to scan PR commits

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0  # gitleaks needs full history to scan all commits

      # --- Secrets scanning ------------------------------------------------
      - name: Secrets scan (gitleaks)
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

      # --- Supply chain / dependency vulnerabilities -----------------------
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev,web,ocr]"

      - name: Dependency audit (pip-audit)
        run: python3 -m pip_audit --skip-editable

      # --- Static security analysis ----------------------------------------
      - name: Static security scan (bandit)
        run: python3 -m bandit -r src/ -ll -c pyproject.toml

      # --- SBOM / dependency baseline validation ---------------------------
      - name: Validate dependency baseline
        run: |
          # Compare package NAMES only (not versions) so version bumps don't false-alarm.
          # Baseline and current list both sorted case-insensitively; local package excluded.
          pip list --format=columns | tail -n +3 | awk '{print $1}' | sort -f \
            | grep -v "^worship-catalog$" > /tmp/current-names.txt
          NEW_PKGS=$(comm -23 /tmp/current-names.txt <(sort -f sbom-baseline.txt) \
            | grep -v "^$" || true)
          if [ -n "$NEW_PKGS" ]; then
            echo "New packages detected not in sbom-baseline.txt:"
            echo "$NEW_PKGS"
            exit 1
          fi
          echo "Dependency baseline check passed — no unexpected new packages."

  publish:
    needs: [test, security]
    # Only publish on pushes to main or the weekly scheduled run — not on PRs
    if: github.event_name == 'push' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # required to push to ghcr.io
      security-events: write   # required to upload Trivy SARIF results (#81)

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-tags: true   # required for docker/metadata-action semver tagging (#36)

      # On a push: only rebuild if image-affecting files changed.
      # On schedule: always rebuild (base image may have security patches).
      - name: Check for relevant file changes
        id: changes
        if: github.event_name == 'push'
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4.0.1
        with:
          filters: |
            app:
              - "Dockerfile"
              - "pyproject.toml"
              - "src/**"
              - "config/**"
              - "scripts/**"

      - name: Set up Docker Buildx
        if: steps.changes.outputs.app == 'true' || github.event_name == 'schedule'
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - name: Log in to GitHub Container Registry
        if: steps.changes.outputs.app == 'true' || github.event_name == 'schedule'
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2  # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags and labels
        id: meta
        if: steps.changes.outputs.app == 'true' || github.event_name == 'schedule'
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-,format=long
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      # --- Container image vulnerability scanning (#32, #66) ---------------
      # Build locally first so Trivy scans BEFORE anything is pushed.
      # A vulnerable image is never published — CVEs block the push step (#66).
      - name: Build image (local, for CVE scan)
        if: steps.changes.outputs.app == 'true' || github.event_name == 'schedule'
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294  # v7.0.0
        with:
          context: .
          push: false
          load: true            # load into local Docker daemon for scanning
          platforms: linux/amd64
          tags: local-scan:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image for CVEs
        if: steps.changes.outputs.app == 'true' || github.event_name == 'schedule'
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # v0.35.0
        with:
          image-ref: local-scan:latest
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true   # only fail on CVEs that have an available fix (actionable)
          exit-code: 1

      - name: Upload Trivy results to GitHub Security tab
        if: (steps.changes.outputs.app == 'true' || github.event_name == 'schedule') && always()
        uses: github/codeql-action/upload-sarif@820e3160e279568db735cee8ed8f8e77a6da7818  # v3
        with:
          sarif_file: trivy-results.sarif

      # Build and push multi-platform only after the CVE scan passes (#66).
      # GHA cache from the local build above makes this fast (no layer re-download).
      - name: Build and push (multi-platform)
        if: steps.changes.outputs.app == 'true' || github.event_name == 'schedule'
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294  # v7.0.0
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64   # arm64 required for Raspberry Pi 4/5 (#48)
          # SHA tag always; semver tags added when a vX.Y.Z tag is pushed (#36)
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: true
