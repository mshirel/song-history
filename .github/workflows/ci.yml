name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:        # Manual trigger — always runs full publish pipeline
  schedule:
    - cron: "0 6 * * 1"  # Every Monday — rebuild to pick up base image security patches

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev,web,ocr]"

      - name: Lint (ruff)
        run: python3 -m ruff check src/

      - name: Type check (mypy)
        run: python3 -m mypy src/

      - name: Test
        run: python3 -m pytest

      # Integration tests that require real PPTX files are skipped gracefully
      # in CI (the fixture files are gitignored large binaries).  DB-only
      # integration tests run as part of the default `pytest` run above.
      # This step explicitly runs the integration subset to surface any
      # unexpected skip-all regressions — closes #137.
      - name: Integration tests (DB-only subset)
        run: python3 -m pytest -m "integration and not slow" -v --tb=short

  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read  # gitleaks needs this to scan PR commits

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0  # gitleaks needs full history to scan all commits

      # --- Secrets scanning ------------------------------------------------
      - name: Secrets scan (gitleaks)
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

      # --- Supply chain / dependency vulnerabilities -----------------------
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev,web,ocr]"

      - name: Verify lockfile is up to date (#174)
        run: |
          pipx run --spec pip-tools pip-compile --strip-extras --extra web --extra ocr --output-file /tmp/requirements.lock pyproject.toml
          # Compare non-comment lines only (header contains the output path which differs)
          grep -v '^#' requirements.lock > /tmp/lock-current.txt
          grep -v '^#' /tmp/requirements.lock > /tmp/lock-fresh.txt
          diff /tmp/lock-current.txt /tmp/lock-fresh.txt || {
            echo "::error::requirements.lock is out of date — run: pip-compile --strip-extras --extra web --extra ocr --output-file requirements.lock pyproject.toml"
            exit 1
          }

      - name: Dependency audit (pip-audit)
        run: python3 -m pip_audit --skip-editable

      # --- Static security analysis ----------------------------------------
      - name: Static security scan (bandit)
        run: python3 -m bandit -r src/ -ll -c pyproject.toml

      # --- SBOM / dependency baseline validation ---------------------------
      - name: Validate dependency baseline
        run: |
          # Compare package NAMES only (not versions) so version bumps don't false-alarm.
          # Lowercase all names before sorting so comm uses a stable byte-order comparison.
          # (sort -f keeps original case, which confuses comm's byte-level ordering.)
          pip list --format=columns | tail -n +3 | awk '{print tolower($1)}' | sort \
            | grep -v "^worship-catalog$" > /tmp/current-names.txt
          NEW_PKGS=$(comm -23 /tmp/current-names.txt <(tr '[:upper:]' '[:lower:]' < sbom-baseline.txt | sort) \
            | grep -v "^$" || true)
          if [ -n "$NEW_PKGS" ]; then
            echo "New packages detected not in sbom-baseline.txt:"
            echo "$NEW_PKGS"
            exit 1
          fi
          echo "Dependency baseline check passed — no unexpected new packages."

  publish:
    needs: [test, security]
    # Only publish on pushes to main, the weekly scheduled run, or manual dispatch — not on PRs
    if: github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # required to push to ghcr.io
      security-events: write   # required to upload Trivy SARIF results (#81)

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-tags: true   # required for docker/metadata-action semver tagging (#36)

      # On a push: only rebuild if image-affecting files changed.
      # On schedule: always rebuild (base image may have security patches).
      - name: Check for relevant file changes
        id: changes
        if: github.event_name == 'push'
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4.0.1
        with:
          filters: |
            app:
              - "Dockerfile"
              - "pyproject.toml"
              - "requirements.lock"
              - "src/**"
              - "config/**"
              - "scripts/**"

      - name: Set up QEMU
        if: steps.changes.outputs.app == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a  # v4.0.0

      - name: Set up Docker Buildx
        if: steps.changes.outputs.app == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - name: Log in to GitHub Container Registry
        if: steps.changes.outputs.app == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2  # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags and labels
        id: meta
        if: steps.changes.outputs.app == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-,format=long
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      # --- Container image vulnerability scanning (#32, #66) ---------------
      # Build locally first so Trivy scans BEFORE anything is pushed.
      # A vulnerable image is never published — CVEs block the push step (#66).
      - name: Build image (local, for CVE scan)
        if: steps.changes.outputs.app == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294  # v7.0.0
        with:
          context: .
          push: false
          load: true            # load into local Docker daemon for scanning
          platforms: linux/amd64
          tags: local-scan:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image for CVEs
        if: steps.changes.outputs.app == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # v0.35.0
        with:
          image-ref: local-scan:latest
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true   # only fail on CVEs that have an available fix (actionable)
          exit-code: 1

      - name: Upload Trivy results to GitHub Security tab
        if: (steps.changes.outputs.app == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && always()
        uses: github/codeql-action/upload-sarif@b1bff81932f5cdfc8695c7752dcee935dcd061c8  # v4.33.0
        with:
          sarif_file: trivy-results.sarif

      # Smoke-test the local image before pushing (#88).
      # Reuses local-scan:latest built above — no extra docker build needed.
      - name: Smoke test image
        if: steps.changes.outputs.app == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          docker run -d --name smoke-test \
            -e DB_PATH=/tmp/test.db \
            -p 8765:8000 \
            local-scan:latest
          # Wait for the server to start (max 15s)
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8765/health; then
              echo "Smoke test passed"
              docker stop smoke-test
              exit 0
            fi
            sleep 1
          done
          echo "Smoke test FAILED — server did not start within 15s"
          docker logs smoke-test
          docker stop smoke-test
          exit 1

      # Build and push multi-platform only after the CVE scan and smoke test pass (#66, #88).
      # GHA cache from the local build above makes this fast (no layer re-download).
      - name: Build and push (multi-platform)
        if: steps.changes.outputs.app == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294  # v7.0.0
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64   # arm64 required for Raspberry Pi 4/5 (#48)
          # SHA tag always; semver tags added when a vX.Y.Z tag is pushed (#36)
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: true
