name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 6 * * 1"  # Every Monday — rebuild to pick up base image security patches

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev,web,ocr]"

      - name: Lint (ruff)
        run: python3 -m ruff check src/

      - name: Type check (mypy)
        run: python3 -m mypy src/

      - name: Test
        run: python3 -m pytest

  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0  # gitleaks needs full history to scan all commits

      # --- Secrets scanning ------------------------------------------------
      - name: Secrets scan (gitleaks)
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # --- Supply chain / dependency vulnerabilities -----------------------
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev,web,ocr]"

      - name: Dependency audit (pip-audit)
        run: python3 -m pip_audit --skip-editable

      # --- Static security analysis ----------------------------------------
      - name: Static security scan (bandit)
        run: python3 -m bandit -r src/ -ll -c pyproject.toml

  publish:
    needs: [test, security]
    # Only publish on pushes to main or the weekly scheduled run — not on PRs
    if: github.event_name == 'push' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # required to push to ghcr.io

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      # On a push: only rebuild if image-affecting files changed.
      # On schedule: always rebuild (base image may have security patches).
      - name: Check for relevant file changes
        id: changes
        if: github.event_name == 'push'
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36  # v3
        with:
          filters: |
            app:
              - "Dockerfile"
              - "pyproject.toml"
              - "src/**"
              - "config/**"
              - "scripts/**"

      - name: Set up Docker Buildx
        if: steps.changes.outputs.app == 'true' || github.event_name == 'schedule'
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: Log in to GitHub Container Registry
        if: steps.changes.outputs.app == 'true' || github.event_name == 'schedule'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        if: steps.changes.outputs.app == 'true' || github.event_name == 'schedule'
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25  # v5
        with:
          context: .
          push: true
          # Only SHA-tagged and semver-tagged images — no :latest (#33)
          tags: |
            ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
