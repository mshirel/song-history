name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:        # Manual trigger — always runs full publish pipeline
  schedule:
    - cron: "0 6 * * 1"  # Every Monday — rebuild to pick up base image security patches

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.lock          # locked runtime deps (#285)
          pip install -e ".[dev]"                    # dev tools (pytest, ruff, mypy)

      - name: Lint (ruff)
        run: python3 -m ruff check src/

      - name: Type check (mypy)
        run: python3 -m mypy src/

      - name: Test
        run: |
          python3 -m pytest --cov=src/worship_catalog --cov-report=term-missing 2>&1 | tee /tmp/test.log
          count=$(grep -oP '\d+ passed' /tmp/test.log | grep -oP '\d+')
          # Floor must track the real suite size (1100+ tests as of 2026-05).
          # Bump this whenever the suite grows by >50 tests so a deleted test
          # file can't slip through (#409).
          if [ -z "$count" ] || [ "$count" -lt 950 ]; then
            echo "ERROR: Expected at least 950 tests to pass, got ${count:-0}"
            exit 1
          fi

      # Integration tests that require real PPTX files are skipped gracefully
      # in CI (the fixture files are gitignored large binaries).  DB-only
      # integration tests run as part of the default `pytest` run above.
      # This step explicitly runs the integration subset to surface any
      # unexpected skip-all regressions — closes #137.
      - name: Integration tests (DB-only subset)
        run: |
          python3 -m pytest -m "integration and not slow" -v --tb=short 2>&1 | tee /tmp/integration.log
          # Verify at least 5 integration tests actually passed.
          # Without this check, pytest -m exits 0 even when zero tests match,
          # silently defeating the purpose of this step (#200).
          count=$(grep -oP '\d+ passed' /tmp/integration.log | grep -oP '\d+')
          if [ -z "$count" ] || [ "$count" -lt 5 ]; then
            echo "ERROR: Expected at least 5 integration tests to pass, got ${count:-0}"
            exit 1
          fi

      - name: Mutation testing (informational)
        continue-on-error: true  # non-blocking until mutmut 3.x compatibility is resolved (#322)
        run: |
          python3 -m mutmut run --max-children 2 2>&1 | tee /tmp/mutmut.log || true
          python3 -m mutmut results 2>&1 || echo "No mutant results available"

  e2e:
    needs: [test]  # only run after unit/integration tests pass
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.lock          # locked runtime deps (#285)
          pip install -e ".[dev]"                    # dev tools (pytest, playwright)

      - name: Install Playwright Chromium
        run: python3 -m playwright install chromium --with-deps

      - name: Seed test database
        run: |
          mkdir -p /tmp/e2e-inbox
          python3 -c "
          from worship_catalog.db import Database
          db = Database('/tmp/e2e-test.db')
          db.connect()
          db.init_schema()
          # Seed enough songs for search/filter E2E tests to meaningfully reduce rows
          songs = [
              ('amazing grace', 'Amazing Grace', 'John Newton', None),
              ('how great thou art', 'How Great Thou Art', 'Stuart K. Hine', 'Stuart K. Hine'),
              ('blessed assurance', 'Blessed Assurance', 'Fanny Crosby', 'Phoebe Knapp'),
              ('great is thy faithfulness', 'Great Is Thy Faithfulness', 'Thomas Chisholm', 'William Runyan'),
              ('it is well', 'It Is Well With My Soul', 'Horatio Spafford', 'Philip Bliss'),
              ('holy holy holy', 'Holy Holy Holy', 'Reginald Heber', 'John B. Dykes'),
          ]
          song_ids = []
          edition_ids = []
          for canonical, display, words, music in songs:
              sid = db.insert_or_get_song(canonical, display)
              eid = db.insert_or_get_song_edition(sid, words_by=words, music_by=music, arranger=None)
              song_ids.append(sid)
              edition_ids.append(eid)
          svc = db.insert_or_update_service('2026-02-15', 'AM Worship', 'test.pptx', 'abc123', song_leader='Matt')
          for i, (sid, eid) in enumerate(zip(song_ids, edition_ids)):
              db.insert_service_song(svc, sid, ordinal=i+1, song_edition_id=eid)
              db.insert_or_get_copy_event(svc, sid, 'projection', song_edition_id=eid)
          db.close()
          print('E2E test database seeded at /tmp/e2e-test.db')
          "

      - name: Start server
        run: |
          # TESTING=1 lets the app use an ephemeral CSRF secret instead of
          # requiring CSRF_SECRET, which is mandatory in production (#406).
          DB_PATH=/tmp/e2e-test.db INBOX_DIR=/tmp/e2e-inbox TESTING=1 \
            python3 -m uvicorn worship_catalog.web.app:app \
              --host 127.0.0.1 --port 8000 &
          # Wait for server to become healthy (max 15s)
          for i in $(seq 1 15); do
            if curl -sf http://127.0.0.1:8000/health; then
              echo "Server is ready"
              break
            fi
            sleep 1
          done
          # Final health check — fail fast if server never started
          curl -sf http://127.0.0.1:8000/health || {
            echo "ERROR: Server did not start within 15s"
            exit 1
          }

      - name: Run E2E tests
        env:
          E2E_BASE_URL: "http://127.0.0.1:8000"
        run: python3 -m pytest -m e2e -v --tb=short --no-header -p no:cacheprovider

  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read  # gitleaks needs this to scan PR commits

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0  # gitleaks needs full history to scan all commits

      # --- Secrets scanning ------------------------------------------------
      - name: Secrets scan (gitleaks)
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

      # --- Supply chain / dependency vulnerabilities -----------------------
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade "pip>=26.1"          # fix CVE-2026-6357 in pip itself
          pip install -r requirements.lock          # locked runtime deps (#321)
          pip install -e ".[dev]"                    # dev tools (bandit, pip-audit)

      - name: Verify lockfile is up to date (#174)
        run: |
          pipx run --spec pip-tools pip-compile --strip-extras --extra web --extra ocr --output-file /tmp/requirements.lock pyproject.toml
          # Compare non-comment lines only (header contains the output path which differs)
          grep -v '^#' requirements.lock > /tmp/lock-current.txt
          grep -v '^#' /tmp/requirements.lock > /tmp/lock-fresh.txt
          diff /tmp/lock-current.txt /tmp/lock-fresh.txt || {
            echo "::error::requirements.lock is out of date — run: pip-compile --strip-extras --extra web --extra ocr --output-file requirements.lock pyproject.toml"
            exit 1
          }

      - name: Dependency audit (pip-audit)
        # CVE-2026-3219 affects pip itself; no fix released upstream yet.
        # Re-evaluate at every Dependabot bump of requirements.lock and remove
        # this --ignore-vuln once a fixed pip ships. Tracked by #408.
        run: python3 -m pip_audit --skip-editable --ignore-vuln CVE-2026-3219

      # --- Static security analysis ----------------------------------------
      - name: Static security scan (bandit)
        run: python3 -m bandit -r src/ -ll -c pyproject.toml

      # --- SBOM / dependency baseline validation ---------------------------
      - name: Validate dependency baseline
        run: |
          # Compare package NAMES only (not versions) so version bumps don't false-alarm.
          # Lowercase all names before sorting so comm uses a stable byte-order comparison.
          # (sort -f keeps original case, which confuses comm's byte-level ordering.)
          pip list --format=columns | tail -n +3 | awk '{print tolower($1)}' | sort \
            | grep -v "^worship-catalog$" > /tmp/current-names.txt
          NEW_PKGS=$(comm -23 /tmp/current-names.txt <(tr '[:upper:]' '[:lower:]' < sbom-baseline.txt | sort) \
            | grep -v "^$" || true)
          if [ -n "$NEW_PKGS" ]; then
            echo "New packages detected not in sbom-baseline.txt:"
            echo "$NEW_PKGS"
            exit 1
          fi
          echo "Dependency baseline check passed — no unexpected new packages."

  publish:
    needs: [test, security, e2e]
    # Only publish on pushes to main, the weekly scheduled run, or manual dispatch — not on PRs
    if: github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # required to push to ghcr.io
      security-events: write   # required to upload Trivy SARIF results (#81)

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-tags: true   # required for docker/metadata-action semver tagging (#36)

      # On a push: only rebuild if image-affecting files changed.
      # On schedule: always rebuild (base image may have security patches).
      - name: Check for relevant file changes
        id: changes
        if: github.event_name == 'push'
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4.0.1
        with:
          filters: |
            app:
              - "Dockerfile"
              - "pyproject.toml"
              - "requirements.lock"
              - "src/**"
              - "config/**"
              - "scripts/**"

      - name: Set up QEMU
        if: steps.changes.outputs.app == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a  # v4.0.0

      - name: Set up Docker Buildx
        if: steps.changes.outputs.app == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: Log in to GitHub Container Registry
        if: steps.changes.outputs.app == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags and labels
        id: meta
        if: steps.changes.outputs.app == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9  # v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-,format=long
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      # --- Container image vulnerability scanning (#32, #66) ---------------
      # Build locally first so Trivy scans BEFORE anything is pushed.
      # A vulnerable image is never published — CVEs block the push step (#66).
      - name: Build image (local, for CVE scan)
        if: steps.changes.outputs.app == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          push: false
          load: true            # load into local Docker daemon for scanning
          platforms: linux/amd64
          tags: local-scan:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            APP_VERSION=${{ github.ref_name }}
            BUILD_DATE=${{ github.event.head_commit.timestamp || github.event.repository.updated_at }}

      - name: Scan image for CVEs
        if: steps.changes.outputs.app == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: local-scan:latest
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true   # only fail on CVEs that have an available fix (actionable)
          exit-code: 1

      - name: Upload Trivy results to GitHub Security tab
        if: (steps.changes.outputs.app == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && always()
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa  # v4.36.0
        with:
          sarif_file: trivy-results.sarif

      # Smoke-test the local image before pushing (#88).
      # Reuses local-scan:latest built above — no extra docker build needed.
      - name: Smoke test image
        if: steps.changes.outputs.app == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          # CSRF_SECRET is mandatory in production (#406); supply an ephemeral
          # one so the image boots the same code path a real deployment uses.
          docker run -d --name smoke-test \
            -e DB_PATH=/tmp/test.db \
            -e CSRF_SECRET=smoke-test-ephemeral-secret \
            -p 8765:8000 \
            local-scan:latest
          # Wait for the server to start (max 15s)
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8765/health; then
              echo "Smoke test passed"
              docker stop smoke-test
              exit 0
            fi
            sleep 1
          done
          echo "Smoke test FAILED — server did not start within 15s"
          docker logs smoke-test
          docker stop smoke-test
          exit 1

      # Build and push multi-platform only after the CVE scan and smoke test pass (#66, #88).
      # GHA cache from the local build above makes this fast (no layer re-download).
      - name: Build and push (multi-platform)
        if: steps.changes.outputs.app == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64   # arm64 required for Raspberry Pi 4/5 (#48)
          # SHA tag always; semver tags added when a vX.Y.Z tag is pushed (#36)
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: true
          build-args: |
            APP_VERSION=${{ github.ref_name }}
            BUILD_DATE=${{ github.event.head_commit.timestamp || github.event.repository.updated_at }}
