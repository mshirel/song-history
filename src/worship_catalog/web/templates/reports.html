{% extends "base.html" %}
{% block title %}Reports — Worship Catalog{% endblock %}
{% block content %}
<h1>Generate Reports</h1>

<!-- CCLI Report -->
<div class="card">
  <h2>CCLI Usage Report <small style="font-weight:400;color:#6c757d;font-size:0.85rem">(CSV download)</small></h2>
  <form method="post" action="/reports/ccli">
    <div class="form-grid">
      <div>
        <label for="ccli-from">From</label>
        <input type="date" id="ccli-from" name="start_date" required>
      </div>
      <div>
        <label for="ccli-to">To</label>
        <input type="date" id="ccli-to" name="end_date" required>
      </div>
      <div style="display:flex;align-items:flex-end;">
        <button type="submit">Download CSV</button>
      </div>
    </div>
  </form>
</div>

<!-- Stats Report -->
<div class="card">
  <h2>Song Statistics <small style="font-weight:400;color:#6c757d;font-size:0.85rem">(view in browser)</small></h2>
  <form
    method="post"
    action="/reports/stats"
    hx-post="/reports/stats"
    hx-target="#stats-result"
    hx-indicator="#stats-spinner"
  >
    <div class="form-grid">
      <div>
        <label for="stats-from">From</label>
        <input type="date" id="stats-from" name="start_date" required>
      </div>
      <div>
        <label for="stats-to">To</label>
        <input type="date" id="stats-to" name="end_date" required>
      </div>
      <div>
        <label for="stats-leader">Song Leader (optional)</label>
        <input type="text" id="stats-leader" name="leader" placeholder="partial name…">
      </div>
      <div style="display:flex;align-items:flex-end;gap:0.75rem;">
        <button type="submit">Generate</button>
        <span id="stats-spinner" class="htmx-indicator" style="color:#6c757d;font-size:0.85rem;">loading…</span>
      </div>
    </div>
    <label style="font-size:0.85rem;display:flex;align-items:center;gap:0.4rem;margin-top:0.25rem;">
      <input type="checkbox" name="all_songs" value="true"> Show all songs (not just top 20)
    </label>
  </form>
  <div id="stats-result" style="margin-top:1.25rem;"></div>
</div>
{% endblock %}
