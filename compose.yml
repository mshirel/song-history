services:

  # ---------------------------------------------------------------------------
  # IMAGE SOURCE
  #
  # By default all services pull the published image from GitHub Container
  # Registry.  To build and run a local image instead (e.g. while developing
  # or testing changes before pushing), comment out the `image:` line and
  # uncomment the `build:` line in each service below, then run:
  #
  #   docker compose build          # rebuild from local Dockerfile
  #   docker compose up -d web      # start with the newly built image
  #
  # To go back to the published image:
  #
  #   docker compose pull           # fetch latest from GHCR
  #   docker compose up -d web      # start with the pulled image
  # ---------------------------------------------------------------------------

  # ---------------------------------------------------------------------------
  # cli — run any worship-catalog command ad-hoc
  #
  # Examples:
  #   docker compose run --rm cli report ccli --from 2026-01-01
  #   docker compose run --rm cli report stats --all-songs
  #   docker compose run --rm cli repair-credits
  # ---------------------------------------------------------------------------
  cli:
    image: ghcr.io/mshirel/song-history:latest
    # build: .                        # ← uncomment for local development
    env_file:
      - path: .env
        required: false
    volumes:
      - ./data:/data
      - ./inbox:/inbox
      - ./config:/config
    environment:
      - DB_PATH=/data/worship.db
      - INBOX_DIR=/inbox
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  # ---------------------------------------------------------------------------
  # watcher — poll the inbox folder every 5 minutes and import new PPTX files
  #
  # Start:  docker compose up -d watcher
  # Logs:   docker compose logs -f watcher
  # ---------------------------------------------------------------------------
  watcher:
    image: ghcr.io/mshirel/song-history:latest
    # build: .                        # ← uncomment for local development
    init: true                        # tini as PID 1 — forwards SIGTERM to children (#29)
    entrypoint: /bin/sh
    command: >
      -c "while true;
            do /app/scripts/import-new.sh;
            sleep 300;
          done"
    env_file:
      - path: .env
        required: false
    volumes:
      - ./data:/data
      - ./inbox:/inbox
      - ./config:/config
    environment:
      - DB_PATH=/data/worship.db
      - INBOX_DIR=/inbox
    restart: unless-stopped
    stop_grace_period: 30s
    logging:                          # cap log disk usage (#30)
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  # ---------------------------------------------------------------------------
  # web — FastAPI + HTMX reporting & song browser UI
  #
  # Start:  docker compose up -d web
  # Open:   http://localhost:8000
  # ---------------------------------------------------------------------------
  web:
    image: ghcr.io/mshirel/song-history:latest
    # build: .                        # ← uncomment for local development
    entrypoint: uvicorn
    command: worship_catalog.web.app:app --host 0.0.0.0 --port 8000
    env_file:
      - path: .env
        required: false
    ports:
      - "${WEB_PORT:-8000}:8000"
    volumes:
      - ./data:/data
      - ./config:/config
    environment:
      - DB_PATH=/data/worship.db
    restart: unless-stopped
    stop_grace_period: 15s
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:                          # cap log disk usage (#30)
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 128M

  # ---------------------------------------------------------------------------
  # backup — nightly SQLite dump with 30-day retention
  #
  # Runs daily at midnight, writes compressed SQL dumps to ./backups/.
  # To restore:
  #   gunzip -c backups/worship-YYYYMMDD-HHMMSS.sql.gz | sqlite3 data/worship.db
  #
  # Start:  docker compose up -d backup
  # ---------------------------------------------------------------------------
  backup:
    # Pin alpine to exact digest (#26)
    image: alpine@sha256:25109184c71bdad752c8312a8623239686a9a2071e8825f20acb8f2198c3f659
    init: true                        # tini as PID 1 — forwards SIGTERM to children (#29)
    entrypoint: /bin/sh
    command: >
      -c "apk add --no-cache sqlite > /dev/null 2>&1;
          while true; do
            /scripts/backup.sh /data/worship.db /backup;
            find /backup -name 'worship-*.sql.gz' -mtime +30 -delete;
            sleep 86400;
          done"
    # Healthcheck: fail if .last_success is older than 25 hours (#28)
    healthcheck:
      test: ["CMD", "sh", "-c",
             "test -f /backup/.last_success && \
              find /backup/.last_success -mmin -1500 | grep -q ."]
      interval: 1h
      timeout: 10s
      retries: 1
      start_period: 2h
    volumes:
      - ./data:/data:ro
      - ./backups:/backup
      - ./scripts:/scripts:ro
    restart: unless-stopped
    stop_grace_period: 60s            # allow active dump to finish before SIGKILL (#29)
    logging:                          # cap log disk usage (#30)
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.25'
