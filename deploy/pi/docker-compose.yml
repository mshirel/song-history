# Pi production stack — Traefik + song-history
#
# Transfer this directory to the Pi with:
#   rsync -av deploy/pi/ pi@<PI_IP>:/opt/song-history/
#
# Then on the Pi:
#   cd /opt/song-history
#   touch traefik/acme.json && chmod 600 traefik/acme.json
#   cp .env.example .env && nano .env
#   docker compose up -d
#
# Update:  docker compose pull && docker compose up -d
# Logs:    docker compose logs -f

services:

  # ---------------------------------------------------------------------------
  # traefik — reverse proxy + Let's Encrypt DNS-01 via Cloudflare
  # ---------------------------------------------------------------------------
  traefik:
    image: traefik:v3.7@sha256:d6858791f9e74df44ca4014166647c41cdc2abd3bf2a71b832ca4e1c6a91b257
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      CF_DNS_API_TOKEN: "${CLOUDFLARE_API_TOKEN}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/acme.json:/acme.json   # must exist, chmod 600
    labels:
      - "traefik.enable=false"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # song-history — worship catalog web app
  # Image is pulled from GHCR — no source code needed on the Pi.
  # ---------------------------------------------------------------------------
  watcher:
    # Immutably pinned (#512) — was the mutable :latest. `docker compose pull` on
    # :latest silently swaps running app code with no digest record and no
    # rollback target. Pin to the sha- tag + digest CI publishes; Dependabot's
    # `docker` ecosystem entry (#502) bumps this on a reviewed PR.
    # Tag sha-<commit> = main@b317d78; digest resolved from GHCR 2026-07-04.
    image: ghcr.io/mshirel/song-history:sha-b317d7848a0c55f9fcab05d8c3a3c6f9c68b94fc@sha256:794df3f856d7383816e88e9e19791d16372196483067eb34550075732d33fad7
    restart: unless-stopped
    init: true
    # The app image ships a HEALTHCHECK that probes :8000 (#402); the watcher
    # runs an import loop and serves no HTTP. Instead of disabling liveness
    # entirely, define our own lightweight heartbeat check (#514): each loop
    # iteration touches /tmp/watcher-heartbeat, and the check fails if that file
    # is stale (older than ~2 loop cycles), so a wedged/hung import is caught by
    # monitoring — `restart: unless-stopped` only catches a full process exit.
    healthcheck:
      test:
        - CMD-SHELL
        - test $(( $(date +%s) - $(stat -c %Y /tmp/watcher-heartbeat 2>/dev/null || echo 0) )) -lt 660
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 330s
    entrypoint: /bin/sh
    command: >
      -c "while true; do touch /tmp/watcher-heartbeat; /app/scripts/import-new.sh; sleep 300; done"
    environment:
      DB_PATH: /data/worship.db
      INBOX_DIR: /inbox
      WORSHIP_OCR_PROVIDER: "${WORSHIP_OCR_PROVIDER:-openrouter}"
      WORSHIP_OCR_MODEL: "${WORSHIP_OCR_MODEL:-google/gemini-2.5-flash-lite}"
      WORSHIP_MAX_OCR_CALLS: "${WORSHIP_MAX_OCR_CALLS:-25}"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
    volumes:
      - /opt/song-history/data:/data
      - /opt/song-history/inbox:/inbox
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  song-history:
    # Immutably pinned (#512) — was the mutable :latest. Keep this in lockstep
    # with the `watcher` service above; Dependabot (#502) bumps both.
    # Tag sha-<commit> = main@b317d78; digest resolved from GHCR 2026-07-04.
    image: ghcr.io/mshirel/song-history:sha-b317d7848a0c55f9fcab05d8c3a3c6f9c68b94fc@sha256:794df3f856d7383816e88e9e19791d16372196483067eb34550075732d33fad7
    restart: unless-stopped
    stop_grace_period: 35s
    ports:
      - "8000:8000"  # Prometheus /metrics scraping (internal only — not routed via Traefik)
    environment:
      DB_PATH: /data/worship.db
      INBOX_DIR: /inbox
      WORSHIP_OCR_PROVIDER: "${WORSHIP_OCR_PROVIDER:-openrouter}"
      WORSHIP_OCR_MODEL: "${WORSHIP_OCR_MODEL:-google/gemini-2.5-flash-lite}"
      WORSHIP_MAX_OCR_CALLS: "${WORSHIP_MAX_OCR_CALLS:-25}"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      CSRF_SECRET: "${CSRF_SECRET}"
      PUSHOVER_USER_KEY: "${PUSHOVER_USER_KEY:-}"
      PUSHOVER_APP_TOKEN: "${PUSHOVER_APP_TOKEN:-}"
      # Set UPLOAD_PASSWORD in .env to require Basic Auth on the upload page
      # (#388). Leave unset to keep uploads open. Optional UPLOAD_USERNAME
      # defaults to "highland".
      UPLOAD_PASSWORD: "${UPLOAD_PASSWORD:-}"
      UPLOAD_USERNAME: "${UPLOAD_USERNAME:-highland}"
      # Emit HSTS when served over HTTPS (behind Cloudflare/Traefik) (#405).
      HTTPS_ONLY: "${HTTPS_ONLY:-}"
      # Behind the Cloudflare tunnel, trust CF-Connecting-IP for the real client
      # IP so the upload rate limiter buckets per client, not per tunnel (#448).
      TRUSTED_PROXY: "${TRUSTED_PROXY:-1}"
    volumes:
      - /opt/song-history/data:/data
      - /opt/song-history/inbox:/inbox
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=true"
      # pi-songs.tanx95.us alias added 2026-05-15 so the homelab Uptime Kuma
      # monitor (which checks the internal hostname) returns 200 instead of 404.
      # Cert is still issued for highland-coc.com only; Kuma accepts the
      # default cert for pi-songs.tanx95.us via "ignore TLS errors" mode.
      - "traefik.http.routers.songs.rule=Host(`songs.highland-coc.com`) || Host(`pi-songs.tanx95.us`)"
      - "traefik.http.routers.songs.entrypoints=websecure"
      - "traefik.http.routers.songs.tls.certresolver=letsencrypt"
      - "traefik.http.routers.songs.tls.domains[0].main=highland-coc.com"
      - "traefik.http.routers.songs.tls.domains[0].sans=*.highland-coc.com"
      - "traefik.http.services.songs.loadbalancer.server.port=8000"
      # HTTP → HTTPS redirect (also covers the pi-songs alias)
      - "traefik.http.routers.songs-http.rule=Host(`songs.highland-coc.com`) || Host(`pi-songs.tanx95.us`)"
      - "traefik.http.routers.songs-http.entrypoints=web"
      - "traefik.http.routers.songs-http.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      traefik:
        condition: service_started

  # ---------------------------------------------------------------------------
  # promtail — ships this host's container logs to the homelab Loki (#388).
  # Reads Docker json-file logs read-only; no Docker socket (exposed host).
  # Requires a DMZ->Loki (10.20.100.249:3100) firewall allow on VLAN 249.
  # ---------------------------------------------------------------------------
  promtail:
    # Digest-pinned (#453) — was :latest. Re-pin on a reviewed Dependabot bump.
    image: grafana/promtail:latest@sha256:6cfa64ec432b24a912d640e2edb940eeae2666f61861a66c121d763dd7241381
    restart: unless-stopped
    # Non-root least-privilege (#514) — was `user: root`. Runs as uid 10001 with
    # gid 0 (root group) so it can READ the group-readable Docker json logs under
    # /var/lib/docker/containers WITHOUT root. Requires two host-side prep steps
    # (see docs/pi-deploy.md):
    #   1. Container logs must be group-readable. Docker's default is 0640
    #      root:root (group can read); if a hardened daemon.json sets 0600, apply
    #      an ACL:  setfacl -R -m g:0:rX -d -m g:0:rX /var/lib/docker/containers
    #   2. promtail writes positions.yaml into the mounted /opt/song-history/promtail
    #      dir, so that dir must be writable by uid 10001 (or gid 0):
    #      chown -R 10001:0 /opt/song-history/promtail && chmod -R g+rwX ...
    user: "10001:0"
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - /opt/song-history/promtail:/etc/promtail
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    stop_grace_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # cloudflared — Cloudflare Tunnel for public access to songs.highland-coc.com
  # (#388 Phase 2). Outbound-only to the Cloudflare edge (no inbound ports);
  # reaches the app over the internal compose network. Token-managed: the
  # public-hostname -> service (http://song-history:8000) ingress is configured
  # in the Cloudflare Zero Trust dashboard. Set TUNNEL_TOKEN in .env.
  # ---------------------------------------------------------------------------
  cloudflared:
    # Digest-pinned (#453) — was :latest. The internet-facing tunnel daemon must
    # not silently upgrade; re-pin on a reviewed Dependabot bump.
    image: cloudflare/cloudflared:latest@sha256:6d91c121b803126f7a5344005d17a9324788fc09d305b6e2560ec6040a7ae283
    restart: unless-stopped
    # --metrics pins the Prometheus endpoint to a stable port (default is
    # ephemeral). Published on :2000 for Prometheus to scrape (HOME-176). This
    # port is LAN-only — it is NOT routed through the tunnel; reachability is
    # gated by the VLAN-249 firewall (only mon-prometheus 10.20.100.245 allowed).
    command: tunnel --no-autoupdate --metrics 0.0.0.0:2000 run --token ${TUNNEL_TOKEN}
    # If IPS in Prevention mangles the QUIC/UDP edge connection, force HTTP/2:
    # command: tunnel --no-autoupdate --protocol http2 --metrics 0.0.0.0:2000 run --token ${TUNNEL_TOKEN}
    ports:
      - "2000:2000"   # cloudflared /metrics — Prometheus scrape only (firewall-gated)
    depends_on:
      song-history:
        condition: service_started
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

# Backups are handled by a host cron job running scripts/backup.sh — not a
# sidecar container.  See docs/pi-deploy.md § Backup for setup instructions.
