# Traefik v3 static configuration — Pi deployment
# docs: https://doc.traefik.io/traefik/

# --- Global -----------------------------------------------------------------
global:
  checkNewVersion: false
  sendAnonymousUsage: false

# --- Entry points -----------------------------------------------------------
entryPoints:
  web:
    address: ":80"
  websecure:
    address: ":443"

# --- Certificate resolvers (DNS-01 via Cloudflare) --------------------------
certificatesResolvers:
  letsencrypt:
    acme:
      email: matt@highland-coc.com
      storage: /acme.json
      dnsChallenge:
        provider: cloudflare          # requires CF_DNS_API_TOKEN env var
        delayBeforeCheck: 30s
        disablePropagationCheck: true  # skip DNS propagation query — avoids DNS interception issues
        resolvers:
          - "1.1.1.1:53"
          - "8.8.8.8:53"

# --- Providers --------------------------------------------------------------
providers:
  docker:
    exposedByDefault: false           # require traefik.enable=true label
    network: song-history_default

# --- API / dashboard --------------------------------------------------------
# Dashboard disabled on the Pi (#513). `insecure: true` previously exposed the
# unauthenticated dashboard on :8080, leaking full routing config on a host that
# also mounts the docker socket. To re-enable for LAN, add a router with an auth
# middleware on an internal hostname only — never `insecure: true`.
api:
  dashboard: false

# --- Logging ----------------------------------------------------------------
log:
  level: INFO

accessLog: {}
