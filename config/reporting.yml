# CCLI Reproduction Count Defaults
# These values define how many times each song is counted for copyright reporting
#
# NOTE: This file is NOT yet loaded by the application.
# The import command currently hardcodes projection=1 and recording=1,
# which matches the defaults below. Wiring this file up is tracked in issue #6.
# Until then, edit src/worship_catalog/cli.py to change copy event behavior.

reproduction_counts:
  # Lyrics projected on screen during service
  projection: 1
  # Printed copies distributed to congregation
  print: 0
  # Livestreamed or recorded for later viewing
  recording: 1
  # Translated to another language for the service
  translation: 0

# Public domain songs (do not require CCLI reporting)
public_domain_songs: []

# Song number overrides (CCLI number mapping)
song_number_overrides: {}
