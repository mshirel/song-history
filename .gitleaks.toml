title = "Highland Song History — gitleaks config"

[extend]
# Extend the default ruleset rather than replacing it
useDefault = true

[[rules]]
id = "worship-catalog-db-path"
description = "Hardcoded system path assigned to DB_PATH (outside expected /data/ or /tmp/)"
# RE2 does not support lookaheads — match only paths rooted at common system dirs
# (/home, /etc, /var, /opt, /root, /srv, /usr) which would indicate a real host path.
regex = '''DB_PATH\s*=\s*["\']/(?:home|etc|var|opt|root|srv|usr)/[^"\']+\.db["\']'''
tags = ["config", "path"]

[[rules]]
id = "worship-catalog-api-key"
description = "Anthropic API key pattern"
regex = '''sk-ant-[a-zA-Z0-9\-_]{32,}'''
tags = ["key", "anthropic"]
