[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "worship-catalog"
version = "0.1.0"
description = "Extract song metadata from PowerPoint worship slide decks, store in SQLite, generate CCLI reports"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "GPL-3.0"}
authors = [
    {name = "Matt Shirel", email = "matt@example.local"}
]

dependencies = [
    "python-pptx>=0.6.21",
    "click>=8.0",
    "pydantic>=2.0",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
ocr = [
    "anthropic>=0.40",
]
web = [
    "fastapi>=0.110",
    "jinja2>=3.1",
    "uvicorn>=0.27",
    "python-multipart>=0.0.9",
]
dev = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
    "ruff>=0.1",
    "mypy>=1.0",
    "types-PyYAML>=6.0",
    "httpx>=0.27",
]

[tool.hatch.build.targets.wheel]
packages = ["src/worship_catalog"]

[tool.hatch.build]
include = [
    "src/worship_catalog/**",
]

[project.scripts]
worship-catalog = "worship_catalog.cli:main"

[tool.mypy]
python_version = "3.10"
strict = true
warn_return_any = true
warn_unused_configs = true

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B"]

[tool.pytest.ini_options]
minversion = "7.0"
testpaths = ["tests"]
addopts = "--cov=src/worship_catalog --cov-report=term-missing --strict-markers"
markers = [
    "unit: unit tests",
    "integration: integration tests",
    "slow: slow running tests",
]
